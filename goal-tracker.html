<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Slay">
<title>Daily Slay</title>

<!-- Home screen icon: soft pink/purple with peach emoji -->
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23f0c4e8'/%3E%3Cstop offset='50%25' stop-color='%23d4a8e8'/%3E%3Cstop offset='100%25' stop-color='%23b89ce0'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='180' height='180' rx='40' fill='url(%23g)'/%3E%3Ctext x='90' y='118' font-size='88' text-anchor='middle'%3E%F0%9F%8D%91%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #d4b8f0;
  --bg2: #c4a8e8;
  --bg3: #e8b8d8;
  --cell-active: rgba(255,255,255,0.62);
  --cell-empty: rgba(190,155,220,0.32);
  --cell-today: rgba(255,255,255,0.82);
  --card: rgba(255,255,255,0.94);
  --text: #2a1a3e;
  --muted: #7a5a90;
  --accent: #9b5de5;
  --accent2: #c77dff;
  --danger: #e05a6a;
  --shadow: 0 8px 32px rgba(100,50,160,0.18);
  --radius: 18px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'DM Sans', sans-serif;
  background: linear-gradient(160deg, #c4d3f5 0%, #a8baea 50%, #96aad8 100%);
  min-height: 100vh;
  color: var(--text);
  user-select: none;
  -webkit-user-select: none;
}

/* ── VIEWS ── */
.view { display: none; position: fixed; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.view.active { display: block; }

/* ══════════════════════════════════
   CALENDAR VIEW
══════════════════════════════════ */
#calendarView {
  background: linear-gradient(160deg, #e0c8f8 0%, #d4b0ee 40%, #f0b8d8 100%);
  padding-bottom: 100px;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  overflow-y: hidden !important;
}

/* Sticky top: streak + DOW */
.cal-sticky-header {
  flex-shrink: 0;
  padding-top: 16px;
}

.streak-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin: 0 16px 6px;
  background: rgba(255,255,255,0.35);
  border-radius: 40px;
  padding: 6px 18px;
}
.streak-bar .fire { font-size: 20px; }
.streak-bar .streak-text { font-size: 13px; font-weight: 600; color: var(--text); }
.streak-bar .streak-sub { font-size: 11px; color: var(--muted); margin-left: 2px; }

.cal-dow-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 0 12px;
  margin-bottom: 2px;
}
.cal-dow {
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  padding: 2px 0;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ── Carousel ── */
.cal-carousel {
  flex: 1;
  display: flex;
  overflow-x: scroll;
  overflow-y: hidden;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  scroll-behavior: smooth;
  touch-action: pan-x;
}
.cal-carousel::-webkit-scrollbar { display: none; }

.cal-slide {
  flex: 0 0 100%;
  width: 100%;
  scroll-snap-align: center;
  scroll-snap-stop: always;
  padding: 0 12px 6px;
  display: flex;
  flex-direction: column;
  touch-action: pan-x;
  overflow: hidden;
}

/* Month label inside each slide */
.slide-month-label {
  text-align: center;
  padding: 4px 0 6px;
}
.slide-month-label .month-name {
  font-family: 'Nunito', sans-serif;
  font-size: 36px;
  font-weight: 900;
  color: var(--text);
  line-height: 1;
  letter-spacing: -1px;
}
.slide-month-label .year-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
}

/* Cell grid */
.cal-cells {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  grid-auto-rows: 1fr;
  gap: 3px;
  flex: 1;
}

/* Taller rectangular cells */
.cal-cell {
  aspect-ratio: unset;
  height: auto;
  min-height: 64px;
  flex: 1;
  border-radius: 10px;
  background: var(--cell-empty);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 16px 1px 3px;
  cursor: pointer;
  transition: transform 0.1s;
}
.cal-cell:active { transform: scale(0.93); }
.cal-cell.has-data { background: var(--cell-active); }
.cal-cell.today { background: var(--cell-today); box-shadow: 0 0 0 2px rgba(155,93,229,0.55); }
.cal-cell.other-month { opacity: 0.28; pointer-events: none; }

.cal-cell .day-num {
  position: absolute;
  top: 3px;
  left: 0; right: 0;
  text-align: center;
  font-size: 9px;
  font-weight: 700;
  color: var(--muted);
  line-height: 1;
}

/* Emoji grid inside cell — up to 12 in 3 cols × 4 rows */
.cal-cell .emoji-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  width: 100%;
  padding: 0;
  gap: 1px;
  align-items: center;
  justify-items: center;
  flex: 1;
}
.cal-cell .emoji-grid span {
  font-size: 11px;
  line-height: 1.3;
  display: block;
  text-align: center;
  width: 100%;
}
/* For 1–2 emojis, center them bigger */
.cal-cell.few-emojis .emoji-grid {
  grid-template-columns: repeat(2, 1fr);
}
.cal-cell.few-emojis .emoji-grid span { font-size: 15px; }

/* Bottom bar */
.bottom-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 12px 20px 28px;
  background: rgba(195,155,230,0.72);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid rgba(255,255,255,0.35);
  z-index: 100;
}
.bar-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  background: none;
  border: none;
  cursor: pointer;
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  transition: color 0.15s;
  padding: 4px 8px;
}
.bar-btn .icon { font-size: 22px; display: flex; align-items: center; justify-content: center; color: var(--muted); }
.bar-btn:active { color: var(--accent); }

.log-btn-wrap { position: relative; }
.log-btn {
  width: 58px; height: 58px;
  border-radius: 50%;
  background: linear-gradient(135deg, #9b5de5, #f72585);
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  box-shadow: 0 4px 18px rgba(155,93,229,0.45);
  margin-top: -20px;
  transition: transform 0.15s, box-shadow 0.15s;
}
.log-btn:active { transform: scale(0.93); box-shadow: 0 2px 8px rgba(155,93,229,0.3); }

/* ══════════════════════════════════
   CHECK-IN OVERLAY
══════════════════════════════════ */
#checkinOverlay {
  position: fixed; inset: 0; z-index: 200;
  display: none;
  align-items: flex-end;
  justify-content: center;
  background: rgba(100,120,180,0.35);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  padding: 20px;
}
#checkinOverlay.open { display: flex; }

.checkin-card {
  background: var(--card);
  border-radius: 28px;
  padding: 28px 22px 22px;
  width: 100%;
  max-width: 420px;
  box-shadow: var(--shadow);
  animation: slideUp 0.3s cubic-bezier(0.34,1.4,0.64,1);
}
@keyframes slideUp {
  from { transform: translateY(60px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.checkin-title {
  font-family: 'Nunito', sans-serif;
  font-size: 26px;
  font-weight: 900;
  text-align: center;
  color: var(--text);
  margin-bottom: 6px;
}
.checkin-date {
  text-align: center;
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 20px;
  font-weight: 500;
}

.goal-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.goal-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 12px 6px 10px;
  border-radius: 16px;
  background: rgba(210,180,240,0.22);
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.goal-item.selected {
  background: rgba(155,93,229,0.12);
  border-color: rgba(155,93,229,0.5);
}
.goal-item:active { transform: scale(0.93); }
.goal-item .g-emoji { font-size: 28px; line-height: 1; }
.goal-item .g-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  text-align: center;
  line-height: 1.2;
  word-break: break-word;
}
.goal-item.selected .g-label { color: var(--accent); }
.goal-item .check-dot {
  position: absolute;
  top: 6px; right: 6px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent);
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  color: white;
}
.goal-item.selected .check-dot { display: flex; }

.checkin-footer {
  display: flex;
  gap: 10px;
  align-items: center;
}
.btn-cancel {
  flex: 0;
  padding: 14px 18px;
  border-radius: 14px;
  background: rgba(184,201,242,0.4);
  border: none;
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
}
.btn-cancel:active { background: rgba(184,201,242,0.7); }
.btn-done {
  flex: 1;
  padding: 14px;
  border-radius: 14px;
  background: linear-gradient(135deg, #9b5de5, #f72585);
  border: none;
  font-size: 16px;
  font-weight: 800;
  color: white;
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  letter-spacing: 0.3px;
  box-shadow: 0 4px 14px rgba(155,93,229,0.35);
}
.btn-done:active { transform: scale(0.97); }

.no-goals-msg {
  text-align: center;
  color: var(--muted);
  font-size: 14px;
  padding: 20px 0;
  line-height: 1.6;
}

/* ══════════════════════════════════
   SETTINGS VIEW
══════════════════════════════════ */
#settingsView {
  background: linear-gradient(160deg, #e0c8f8 0%, #d4b0ee 40%, #f0b8d8 100%);
  padding-bottom: 60px;
  overflow-y: auto !important;
  -webkit-overflow-scrolling: touch;
}
.settings-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 20px 16px;
}
.settings-header h2 {
  font-family: 'Nunito', sans-serif;
  font-size: 34px;
  font-weight: 900;
  color: var(--text);
}
.btn-back {
  background: rgba(255,255,255,0.45);
  border: none;
  border-radius: 50%;
  width: 38px; height: 38px;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text);
}
.btn-back:active { background: rgba(255,255,255,0.7); }

.settings-section {
  margin: 0 28px 20px;
}
.section-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 10px;
  padding-left: 4px;
}
.goals-list {
  background: var(--card);
  border-radius: var(--radius);
  overflow: visible;
  box-shadow: var(--shadow);
  touch-action: pan-y;
}
.goal-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid rgba(210,180,240,0.35);
  transition: background 0.15s;
  touch-action: pan-y;
}
.goal-row.dragging {
  background: rgba(155,93,229,0.08);
  border-radius: 12px;
  opacity: 0.7;
}
.goal-row.drag-over {
  border-top: 2px solid rgba(155,93,229,0.6);
}
.drag-handle {
  color: var(--muted);
  opacity: 0.5;
  cursor: grab;
  font-size: 16px;
  padding: 4px 2px;
  flex-shrink: 0;
  touch-action: none;
  display: flex;
  flex-direction: column;
  gap: 3px;
  align-items: center;
  justify-content: center;
  margin-right: 6px;
}
.drag-handle span {
  display: block;
  width: 14px;
  height: 2px;
  background: currentColor;
  border-radius: 2px;
}
.goal-row .row-emoji {
  font-size: 26px;
  cursor: pointer;
  min-width: 44px;
  text-align: center;
  padding: 6px 8px;
  border-radius: 10px;
  margin-left: 8px;
}
.goal-row:last-child { border-bottom: none; }
.goal-row .row-emoji {
  font-size: 26px;
  cursor: pointer;
  min-width: 36px;
  text-align: center;
}
.goal-row input {
  flex: 1;
  border: none;
  background: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  outline: none;
}
.goal-row input::placeholder { color: var(--muted); opacity: 0.7; }
.goal-row .btn-del {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  color: var(--danger);
  opacity: 0.7;
  padding: 4px;
}
.goal-row .btn-del:active { opacity: 1; }

.btn-add-goal {
  width: 100%;
  padding: 14px;
  border-radius: var(--radius);
  background: rgba(255,255,255,0.5);
  border: 2px dashed rgba(155,93,229,0.4);
  font-size: 15px;
  font-weight: 600;
  color: var(--accent);
  cursor: pointer;
  margin-top: 10px;
  font-family: 'DM Sans', sans-serif;
  transition: background 0.15s;
}
.btn-add-goal:active { background: rgba(255,255,255,0.7); }

.goals-count-note {
  text-align: center;
  font-size: 12px;
  color: var(--muted);
  margin-top: 8px;
}

/* Export / Danger */
.action-card {
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.action-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  border-bottom: 1px solid rgba(210,180,240,0.3);
  cursor: pointer;
  transition: background 0.15s;
}
.action-row:last-child { border-bottom: none; }
.action-row:active { background: rgba(210,180,240,0.2); }
.action-row .a-icon { font-size: 22px; }
.action-row .a-text { flex: 1; }
.action-row .a-text strong { font-size: 15px; font-weight: 600; display: block; color: var(--text); }
.action-row .a-text span { font-size: 12px; color: var(--muted); }
.action-row .a-chevron { color: var(--muted); font-size: 16px; }
.action-row.danger .a-text strong { color: var(--danger); }

/* ══════════════════════════════════
   EMOJI PICKER OVERLAY
══════════════════════════════════ */
#emojiOverlay {
  position: fixed; inset: 0; z-index: 300;
  display: none;
  align-items: flex-end;
  justify-content: center;
  background: rgba(100,120,180,0.4);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  padding: 20px;
}
#emojiOverlay.open { display: flex; }
.emoji-card {
  background: var(--card);
  border-radius: 28px;
  padding: 22px 18px;
  width: 100%;
  max-width: 420px;
  box-shadow: var(--shadow);
  animation: slideUp 0.28s cubic-bezier(0.34,1.4,0.64,1);
}
.emoji-card h3 {
  font-family: 'Nunito', sans-serif;
  font-size: 22px;
  font-weight: 900;
  margin-bottom: 14px;
  color: var(--text);
  text-align: center;
}
.emoji-input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  align-items: center;
}
.emoji-search {
  flex: 1;
  padding: 10px 14px;
  border-radius: 12px;
  border: 1.5px solid rgba(210,180,240,0.6);
  background: rgba(210,180,240,0.18);
  font-size: 20px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  outline: none;
}
.emoji-search:focus { border-color: var(--accent); }
.btn-use-emoji {
  flex-shrink: 0;
  padding: 10px 16px;
  border-radius: 12px;
  background: linear-gradient(135deg, #9b5de5, #f72585);
  border: none;
  font-size: 14px;
  font-weight: 700;
  color: white;
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  white-space: nowrap;
}
.btn-use-emoji:active { opacity: 0.8; }
.emoji-scroll {
  height: 220px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.emoji-category-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--muted);
  padding: 8px 2px 4px;
}
.emoji-row {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 4px;
  margin-bottom: 4px;
}
.emoji-btn {
  font-size: 24px;
  padding: 8px 4px;
  border-radius: 10px;
  border: none;
  background: none;
  cursor: pointer;
  text-align: center;
  transition: background 0.1s;
}
.emoji-btn:active { background: rgba(184,201,242,0.4); }
.emoji-cancel {
  width: 100%;
  padding: 12px;
  border-radius: 14px;
  background: rgba(184,201,242,0.35);
  border: none;
  font-size: 15px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  margin-top: 12px;
  font-family: 'DM Sans', sans-serif;
}

/* ══════════════════════════════════
   TOAST
══════════════════════════════════ */
#toast {
  position: fixed;
  top: 60px; left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: rgba(30,40,80,0.88);
  color: white;
  padding: 10px 20px;
  border-radius: 40px;
  font-size: 14px;
  font-weight: 600;
  z-index: 500;
  opacity: 0;
  transition: opacity 0.25s, transform 0.25s;
  pointer-events: none;
  white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Confirm overlay */
#confirmOverlay {
  position: fixed; inset: 0; z-index: 400;
  display: none; align-items: center; justify-content: center;
  background: rgba(100,120,180,0.4);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  padding: 30px;
}
#confirmOverlay.open { display: flex; }
.confirm-card {
  background: var(--card);
  border-radius: 24px;
  padding: 28px 22px 20px;
  width: 100%; max-width: 340px;
  box-shadow: var(--shadow);
  text-align: center;
}
.confirm-card h3 { font-family: 'Nunito', sans-serif; font-size: 24px; font-weight: 900; margin-bottom: 10px; color: var(--text); }
.confirm-card p { font-size: 14px; color: var(--muted); line-height: 1.5; margin-bottom: 20px; }
.confirm-btns { display: flex; gap: 10px; }
.confirm-btns button { flex: 1; padding: 13px; border-radius: 13px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.btn-confirm-cancel { background: rgba(210,180,240,0.35); color: var(--muted); }
.btn-confirm-ok { background: var(--danger); color: white; }

/* ── Archive section ── */
.archived-section {
  margin-top: 10px;
}
.archived-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 4px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  background: none;
  border: none;
  width: 100%;
  text-align: left;
  font-family: 'DM Sans', sans-serif;
}
.archived-toggle .toggle-arrow {
  font-size: 10px;
  transition: transform 0.2s;
}
.archived-toggle.open .toggle-arrow { transform: rotate(90deg); }
.archived-list {
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  display: none;
}
.archived-list.open { display: block; }
.archived-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid rgba(210,180,240,0.25);
  opacity: 0.7;
}
.archived-row:last-child { border-bottom: none; }
.archived-row .row-emoji { font-size: 22px; min-width: 32px; text-align: center; }
.archived-row .row-label { flex: 1; font-size: 14px; color: var(--muted); font-style: italic; }
.btn-unarchive {
  background: rgba(155,93,229,0.12);
  border: none;
  border-radius: 8px;
  padding: 5px 10px;
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}
.btn-unarchive:active { background: rgba(155,93,229,0.25); }

/* Archive button on each goal row */
.btn-archive {
  background: none;
  border: none;
  font-size: 14px;
  cursor: pointer;
  color: var(--muted);
  opacity: 0.6;
  padding: 4px 2px;
  flex-shrink: 0;
}
.btn-archive:active { opacity: 1; }
</style>
</head>
<body>

<!-- ══ CALENDAR VIEW ══ -->
<div class="view active" id="calendarView">

  <!-- Sticky header: streak + DOW labels -->
  <div class="cal-sticky-header">
    <div class="streak-bar">
      <span class="fire">🔥</span>
      <span class="streak-text" id="streakCount">0 day streak</span>
      <span class="streak-sub" id="streakSub"></span>
    </div>
    <div class="cal-dow-row">
      <div class="cal-dow">S</div>
      <div class="cal-dow">M</div>
      <div class="cal-dow">T</div>
      <div class="cal-dow">W</div>
      <div class="cal-dow">T</div>
      <div class="cal-dow">F</div>
      <div class="cal-dow">S</div>
    </div>
  </div>

  <!-- Swipe carousel -->
  <div class="cal-carousel" id="calCarousel">
    <!-- slides injected by JS -->
  </div>

  <div class="bottom-bar">
    <button class="bar-btn" onclick="showSettings()">
      <span class="icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </span>
      <span>Settings</span>
    </button>
    <div class="log-btn-wrap">
      <button class="log-btn" onclick="openCheckin()">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="13" cy="13" r="10" stroke="white" stroke-width="2"/>
          <path d="M13 8v5l3 3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M8 13h2M13 8v2" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
          <path d="M9 9l1.4 1.4M17 9l-1.4 1.4" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
        </svg>
      </button>
    </div>
    <button class="bar-btn" onclick="exportCSV()">
      <span class="icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3v12M12 15l-4-4M12 15l4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M5 18h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <rect x="3" y="16" width="18" height="5" rx="2" stroke="currentColor" stroke-width="2"/>
        </svg>
      </span>
      <span>Export</span>
    </button>
  </div>
</div>

<!-- ══ SETTINGS VIEW ══ -->
<div class="view" id="settingsView">
  <div class="settings-header">
    <button class="btn-back" onclick="showCalendar()">‹</button>
    <h2>Settings</h2>
    <div style="width:38px"></div>
  </div>

  <div class="settings-section">
    <div class="section-label">My Goals</div>
    <div class="goals-list" id="goalsList"></div>
    <button class="btn-add-goal" id="addGoalBtn" onclick="addGoal()">+ Add Goal</button>
    <div class="goals-count-note" id="goalsCountNote"></div>

    <div class="archived-section" id="archivedSection" style="display:none">
      <button class="archived-toggle" id="archivedToggle" onclick="toggleArchivedList()">
        <span class="toggle-arrow">›</span>
        <span>Archived Goals</span>
        <span id="archivedCount" style="margin-left:auto; font-size:11px;"></span>
      </button>
      <div class="archived-list" id="archivedList"></div>
    </div>
  </div>

  <div class="settings-section">
    <div class="section-label">Data</div>
    <div class="action-card">
      <div class="action-row" onclick="exportCSV()">
        <span class="a-icon">📊</span>
        <div class="a-text">
          <strong>Export to CSV</strong>
          <span>Opens in Numbers or Excel</span>
        </div>
        <span class="a-chevron">›</span>
      </div>
      <div class="action-row danger" onclick="confirmClearData()">
        <span class="a-icon">🗑️</span>
        <div class="a-text">
          <strong>Clear All Data</strong>
          <span>This cannot be undone</span>
        </div>
        <span class="a-chevron">›</span>
      </div>
    </div>
  </div>
</div>

<!-- ══ CHECK-IN OVERLAY ══ -->
<div id="checkinOverlay">
  <div class="checkin-card">
    <div class="checkin-title">how did you do today? ✨</div>
    <div class="checkin-date" id="checkinDate"></div>
    <div class="goal-grid" id="checkinGrid"></div>
    <div class="checkin-footer">
      <button class="btn-cancel" onclick="closeCheckin()">Cancel</button>
      <button class="btn-done" onclick="saveCheckin()">done!</button>
    </div>
  </div>
</div>

<!-- ══ EMOJI PICKER OVERLAY ══ -->
<div id="emojiOverlay">
  <div class="emoji-card">
    <h3>pick an emoji</h3>
    <div class="emoji-input-row">
      <input class="emoji-search" type="text" placeholder="Type or paste any emoji..." id="emojiSearch" oninput="filterEmojis()">
      <button class="btn-use-emoji" id="btnUseEmoji" onclick="useTypedEmoji()" title="Use this emoji">Use</button>
    </div>
    <div class="emoji-scroll" id="emojiScroll"></div>
    <button class="emoji-cancel" onclick="closeEmojiPicker()">Cancel</button>
  </div>
</div>

<!-- ══ CONFIRM OVERLAY ══ -->
<div id="confirmOverlay">
  <div class="confirm-card">
    <h3>Are you sure?</h3>
    <p>This will permanently delete all your logged data. Your goals/settings will remain.</p>
    <div class="confirm-btns">
      <button class="btn-confirm-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="btn-confirm-ok" onclick="clearAllData()">Delete</button>
    </div>
  </div>
</div>

<div id="toast"></div>

const STORAGE_ARCHIVED = 'dgt_archived_v1';
const STORAGE_LOGS  = 'dgt_logs_v1';

function loadGoals() {
  try { return JSON.parse(localStorage.getItem(STORAGE_GOALS)) || []; }
  catch { return []; }
}
function loadArchived() {
  try { return JSON.parse(localStorage.getItem(STORAGE_ARCHIVED)) || []; }
  catch { return []; }
}
function saveGoals(goals) {
  localStorage.setItem(STORAGE_GOALS, JSON.stringify(goals));
}
function saveArchived(archived) {
  localStorage.setItem(STORAGE_ARCHIVED, JSON.stringify(archived));
}
function loadLogs() {
  try { return JSON.parse(localStorage.getItem(STORAGE_LOGS)) || {}; }
  catch { return {}; }
}
function saveLogs(logs) {
  localStorage.setItem(STORAGE_LOGS, JSON.stringify(logs));
}

      if (dayLog.length <= 2) cell.classList.add('few-emojis');

      const shown = dayLog.slice(0, 12);
      shown.forEach(goalId => {
        const g = [...goals, ...archived].find(x => x.id === goalId);
        if (g) {
          const s = document.createElement('span');
          s.textContent = g.emoji;
          grid.appendChild(s);
        }
      });
      cell.appendChild(grid);
    }

    cell.addEventListener('click', () => openCheckinForDate(key, day));
    container.appendChild(cell);
  }
}

function onCarouselSettle() {
  const carousel = document.getElementById('calCarousel');
  const w = carousel.offsetWidth;
  const idx = Math.round(carousel.scrollLeft / w);

  if (idx === currentSlideIdx) return; // no change

  currentSlideIdx = idx;

  // Prepend a slide if we're at the first
  if (idx === 0) {
    const first = slideMonths[0];
    const newM = offsetMonth(first.year, first.month, -1);
    slideMonths.unshift(newM);
    const newSlide = buildSlide(newM.year, newM.month, 0);
    carousel.insertBefore(newSlide, carousel.firstChild);
    // Jump scroll right by one width to compensate for prepend
    carousel.style.scrollBehavior = 'auto';
    carousel.scrollLeft += w;
    carousel.style.scrollBehavior = '';
    currentSlideIdx = 1;
  }

  // Append a slide if we're at the last
  if (idx >= slideMonths.length - 1) {
    const last = slideMonths[slideMonths.length - 1];
    const newM = offsetMonth(last.year, last.month, 1);
    slideMonths.push(newM);
    carousel.appendChild(buildSlide(newM.year, newM.month, slideMonths.length - 1));
  }

  renderStreak();
}

// Simple debounce for scroll fallback
function debounce(fn, ms) {
  let t;
  return function(...args) {
    clearTimeout(t);
    t = setTimeout(() => fn.apply(this, args), ms);
  };
}

// renderCalendar() is called in a few places — keep it as an alias that refreshes
function renderCalendar() {
  // Re-build all current slides with fresh log data
  const carousel = document.getElementById('calCarousel');
  if (!carousel) return;
  const slides = carousel.querySelectorAll('.cal-slide');
  slides.forEach(slide => {
    const y = parseInt(slide.dataset.year);
    const m = parseInt(slide.dataset.month);
    const cells = slide.querySelector('.cal-cells');
    cells.innerHTML = '';
    buildCells(cells, y, m);
  });
  renderStreak();
}

function renderStreak() {
  const streak = calcStreak();
  const el = document.getElementById('streakCount');
  const sub = document.getElementById('streakSub');
  el.textContent = streak === 1 ? '1 day streak' : `${streak} day streak`;
  sub.textContent = streak >= 7 ? '🎉 keep it up!' : streak > 0 ? 'keep going!' : 'log today to start!';
}

function calcStreak() {
  let streak = 0;
  const today = new Date();
  let d = new Date(today);
  const tk = dateToKey(d);
  if (!logs[tk]) d.setDate(d.getDate() - 1);
  while (true) {
    const k = dateToKey(d);
    if (logs[k] && logs[k].length > 0) { streak++; d.setDate(d.getDate() - 1); }
    else break;
  }
  return streak;
}

function dateToKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}


let checkinDate = null;

function openCheckin() {
  openCheckinForDate(todayKey(), new Date().getDate());
}

function openCheckinForDate(dateKey, dayNum) {
  checkinDate = dateKey;
  const [y, m, d] = dateKey.split('-').map(Number);
  const dateObj = new Date(y, m-1, d);
  const opts = { weekday: 'long', month: 'long', day: 'numeric' };
  document.getElementById('checkinDate').textContent = dateObj.toLocaleDateString('en-US', opts);

  // Pre-select existing log for that day
  checkinSelected = new Set(logs[dateKey] || []);

  const grid = document.getElementById('checkinGrid');
  grid.innerHTML = '';

  if (goals.length === 0) {
    grid.style.display = 'block';
    grid.innerHTML = '<div class="no-goals-msg">No goals yet!<br>Go to ⚙️ Settings to add your goals first.</div>';
  } else {
    grid.style.display = 'grid';
    goals.forEach(g => {
      const item = document.createElement('div');
      item.className = 'goal-item' + (checkinSelected.has(g.id) ? ' selected' : '');
      item.dataset.id = g.id;
      item.innerHTML = `
        <span class="g-emoji">${g.emoji}</span>
        <span class="g-label">${g.label || '—'}</span>
        <span class="check-dot">✓</span>
      `;
      item.addEventListener('click', () => toggleGoal(g.id, item));
      grid.appendChild(item);
    });
  }

  document.getElementById('checkinOverlay').classList.add('open');
}

function toggleGoal(id, el) {
  if (checkinSelected.has(id)) {
    checkinSelected.delete(id);
    el.classList.remove('selected');
  } else {
    checkinSelected.add(id);
    el.classList.add('selected');
  }
}

function closeCheckin() {
  document.getElementById('checkinOverlay').classList.remove('open');
  checkinDate = null;
}

function saveCheckin() {
  if (!checkinDate) return;
  if (checkinSelected.size === 0) {
    delete logs[checkinDate];
  } else {
    logs[checkinDate] = Array.from(checkinSelected);
  }
  saveLogs(logs);
  closeCheckin();
  renderCalendar();
  showToast(checkinSelected.size > 0 ? '✓ Saved!' : 'Entry cleared');
}

function initDragToReorder(list) {
  let dragSrc = null;
  let startY = 0;
  let startIdx = 0;

  list.querySelectorAll('.drag-handle').forEach(handle => {
    handle.addEventListener('touchstart', e => {
      // Save current label values before reorder
      saveGoalsFromUI();
      const row = handle.closest('.goal-row');
      dragSrc = row;
      startY = e.touches[0].clientY;
      startIdx = parseInt(row.dataset.idx);
      row.classList.add('dragging');
      e.preventDefault();
    }, { passive: false });

    handle.addEventListener('touchmove', e => {
      if (!dragSrc) return;
      e.preventDefault();
      const y = e.touches[0].clientY;
      const rows = [...list.querySelectorAll('.goal-row:not(.dragging)')];
      // Remove drag-over from all
      rows.forEach(r => r.classList.remove('drag-over'));
      // Find which row we're hovering over
      for (const row of rows) {
        const rect = row.getBoundingClientRect();
        const mid = rect.top + rect.height / 2;
        if (y < mid) {
          row.classList.add('drag-over');
          break;
        }
      }
    }, { passive: false });

    handle.addEventListener('touchend', e => {
      if (!dragSrc) return;
      const rows = [...list.querySelectorAll('.goal-row:not(.dragging)')];
      const overRow = list.querySelector('.goal-row.drag-over');

      if (overRow) {
        const toIdx = parseInt(overRow.dataset.idx);
        // Reorder goals array
        const moved = goals.splice(startIdx, 1)[0];
        goals.splice(toIdx > startIdx ? toIdx - 1 : toIdx, 0, moved);
        saveGoals(goals);
      }

      // Cleanup
      dragSrc.classList.remove('dragging');
      rows.forEach(r => r.classList.remove('drag-over'));
      dragSrc = null;
      renderGoalsList();
    });
  });
}

function updateGoalLabel(idx, val) {
  goals[idx].label = val.trim();
  saveGoals(goals);
}

function addGoal() {
  if (goals.length >= 12) { showToast('Max 12 goals!'); return; }
  goals.push({ id: Date.now().toString(), emoji: '⭐', label: '' });

}

function deleteGoal(idx) {
  const id = goals[idx].id;
  goals.splice(idx, 1);
  saveGoals(goals);
  // Remove from all logs
  Object.keys(logs).forEach(k => {
    logs[k] = logs[k].filter(x => x !== id);
    if (logs[k].length === 0) delete logs[k];
  });
  saveLogs(logs);
  renderGoalsList();
}

function saveGoalsFromUI() {
  // Pull current input values before leaving settings
  const inputs = document.querySelectorAll('#goalsList input[data-idx]');
  inputs.forEach(inp => {
    const i = parseInt(inp.dataset.idx);
    if (goals[i]) goals[i].label = inp.value.trim();
  });
  saveGoals(goals);
}

// Extract the first emoji character from a string
function extractEmoji(str) {
  // Match emoji sequences (including ZWJ sequences, flags, skin tones)
  const emojiRegex = /(\p{Emoji_Presentation}|\p{Extended_Pictographic})(\uFE0F)?(\u20E3)?(\p{Emoji_Modifier})?/u;
  const segments = [...new Intl.Segmenter('en', { granularity: 'grapheme' }).segment(str)];
  for (const seg of segments) {
    if (/\p{Emoji}/u.test(seg.segment) && seg.segment.trim() !== '') {
      return seg.segment;
    }
  }
  return null;
}

function useTypedEmoji() {
  const raw = document.getElementById('emojiSearch').value.trim();
  if (!raw) { showToast('Type or paste an emoji first!'); return; }
  // Try to extract an emoji from what was typed

  selectEmoji(emoji);
}

// EXPORT CSV
// ══════════════════════════════════
function exportCSV() {
  if (Object.keys(logs).length === 0) {
    showToast('No data to export yet!');
    return;
  }

  const allGoals = [...goals, ...archived];
  const goalLabels = allGoals.map(g => `"${g.emoji} ${g.label}"`).join(',');
  const header = `Date,${goalLabels},Total Completed\n`;

  const rows = Object.entries(logs).sort(([a],[b]) => a.localeCompare(b)).map(([date, loggedIds]) => {
    const [y,m,d] = date.split('-').map(Number);
    const dateStr = `"${MONTHS[m-1]} ${d}, ${y}"`;
    const goalCols = allGoals.map(g => loggedIds.includes(g.id) ? '1' : '0').join(',');
    return `${dateStr},${goalCols},${loggedIds.length}`;
  });

  const csv = header + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `daily-slay-${new Date().getFullYear()}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('📊 CSV exported!');
}
